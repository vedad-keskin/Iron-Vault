version: '3'
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-IronVault}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-your_password_here}
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ironvault2024

  rabbitmq:
    image: rabbitmq:3.12.1-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ__USERNAME}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ__PASSWORD}
    ports:
      - 5672:5672
      - 15672:15672
    expose:
      - 5672
    networks:
      - ironvault2024

  ironvault-rabbitmq:
    restart: on-failure
    build:
      context: .
      dockerfile: Dockerfile.notifications
    environment:
      - RABBITMQ_HOST=${RABBITMQ__HOST}
      - RABBITMQ_USERNAME=${RABBITMQ__USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ__PASSWORD}
      - RABBITMQ_VIRTUALHOST=/
    depends_on:
      - rabbitmq
      - ironvault-api
    networks:
      - ironvault2024
    ports:
      - 7111:80

  ironvault-api:
    restart: unless-stopped
    build:
      context: .
    environment:
      - ENVIRONMENT=Development
      - DB_MODE=local
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-IronVault}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-your_password_here}
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__USERNAME=${RABBITMQ__USERNAME}
      - RABBITMQ__PASSWORD=${RABBITMQ__PASSWORD}
    ports:
      - 5130:5130
    networks:
      - ironvault2024
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  ironvault2024:
    driver: bridge
